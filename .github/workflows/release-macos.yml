name: Release macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build macOS release zip
        run: |
          chmod +x ./release-macos.sh
          ./release-macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExcelForm-macOS
          path: installer-output/ExcelForm-macOS.zip
          if-no-files-found: error
